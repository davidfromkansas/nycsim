<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Manhattan</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#141720; }
  canvas { display:block; }
  button, select, .thoughtB, .fybl { touch-action:manipulation; } /* no Safari double-tap zoom on controls */
  #ui {
    position:fixed; left:50%; bottom:42px; transform:translateX(-50%); /* clears the 34 px #ticker strip */
    display:flex; gap:10px; align-items:center; z-index:10;
    font:11px/1.4 system-ui, -apple-system, sans-serif; color:rgba(255,255,255,.85);
    background:rgba(10,13,20,.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.09); border-radius:12px; padding:7px 12px;
    user-select:none; transition:opacity .4s;
  }
  body.photo #ui { opacity:0; pointer-events:none; }
  #ui .grp { display:flex; gap:5px; align-items:center; }
  #ui .sep { width:1px; height:18px; background:rgba(255,255,255,.14); }
  #ui button {
    font:11px system-ui,sans-serif; color:rgba(255,255,255,.85); cursor:pointer;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.10);
    border-radius:7px; padding:3px 9px;
  }
  #ui button:hover { background:rgba(255,255,255,.16); }
  #ui select {
    font:11px system-ui,sans-serif; color:rgba(255,255,255,.85); background:rgba(255,255,255,.07);
    border:1px solid rgba(255,255,255,.10); border-radius:7px; padding:2px 4px; cursor:pointer;
  }
  #ui select option { color:#111; }
  #ui label { display:flex; gap:5px; align-items:center; opacity:.85; }
  #ui input[type=range] { width:64px; accent-color:#e8a558; height:10px; }
  #hint {
    position:fixed; left:50%; bottom:58px; transform:translateX(-50%); z-index:9;
    font:11px system-ui,sans-serif; color:rgba(255,255,255,.55); pointer-events:none;
    transition:opacity 1.5s; text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  #dbg {
    position:fixed; top:10px; left:10px; z-index:11; display:none; white-space:pre;
    font:10px ui-monospace,monospace; color:#9fe08a; background:rgba(0,0,0,.5);
    padding:6px 8px; border-radius:6px;
  }
  #flyhint {
    position:fixed; left:50%; top:14px; transform:translateX(-50%); z-index:12; display:none;
    font:11px system-ui,sans-serif; color:rgba(255,255,255,.8); pointer-events:none;
    background:rgba(10,13,20,.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:5px 12px;
    text-shadow:0 1px 3px rgba(0,0,0,.6);
  }
  body.flying #flyhint { display:block; }
  #joy {
    position:fixed; left:50%; bottom:96px; transform:translateX(-50%); z-index:30;
    width:116px; height:116px; border-radius:50%; display:none; touch-action:none;
    background:rgba(14,18,26,.35); border:1.5px solid rgba(255,255,255,.28);
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  }
  #joyK {
    position:absolute; left:50%; top:50%; width:50px; height:50px; border-radius:50%;
    background:rgba(255,255,255,.5); border:1px solid rgba(255,255,255,.6);
    transform:translate(-50%,-50%); pointer-events:none;
  }
  #brand { /* nycsim.com logo, top-middle */
    position:fixed; top:8px; left:50%; transform:translateX(-50%); z-index:11;
    width:min(320px, 40vw); pointer-events:none; /* decorative — no reload, clicks pass through to the scene */
    filter:drop-shadow(0 4px 12px rgba(0,10,30,.4));
  }
  #brand img { display:block; width:100%; height:auto; }
  body.photo #brand { display:none !important; } /* clean screenshots */
  @media (max-width: 820px) { #brand { display:none; } } /* the top bar is full on phones/tablets — no room to center it */
  #credit { /* attribution badge — shared style; positioned per breakpoint below */
    display:block; position:fixed; z-index:11;
    font:600 11px/1.2 system-ui, -apple-system, sans-serif; color:rgba(255,255,255,.92); text-decoration:none;
    background:rgba(10,13,20,.55); border:1px solid rgba(255,255,255,.15); border-radius:10px; padding:5px 9px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); touch-action:manipulation;
  }
  @media (min-width: 701px) { #credit { top:227px; right:12px; } } /* desktop: just below City Vitals */
  @media (max-width: 700px) { /* phones: top-right corner */
    #credit { top:calc(10px + env(safe-area-inset-top, 0px)); right:calc(8px + env(safe-area-inset-right, 0px)); }
  }
  body.photo #credit, body.agent #credit, body.focusmode #credit { display:none !important; } /* clean screenshots + declutter */
  body.touchnav #joy { display:block; }
  #lockbtn {
    position:fixed; right:16px; bottom:112px; z-index:30; width:46px; height:46px;
    border-radius:50%; display:none; font:20px system-ui; line-height:44px; text-align:center;
    background:rgba(14,18,26,.5); border:1.5px solid rgba(255,255,255,.3); color:#fff;
    backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); padding:0; cursor:pointer;
  }
  /* lock button removed on mobile (it only ever showed on touch/#touchnav) */
  body.camlock #lockbtn { background:rgba(232,165,88,.75); border-color:rgba(255,220,160,.8); }
  body.photo #lockbtn { display:none; }
  body.photo #joy { display:none; }
  #camview { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:40; display:none; font:11px system-ui,-apple-system,sans-serif; } /* dead-center of the screen */
  #camview .ring { /* squared card at the feed's native aspect — the full frame, no crop */
    width:min(447px, 92vw); border-radius:12px; overflow:hidden; position:relative;
    border:2px solid rgba(120,220,255,.55); box-shadow:0 8px 34px rgba(0,0,0,.55); background:#000;
  }
  #camview img { width:100%; height:auto; min-height:171px; object-fit:contain; display:block; }
  #camview .live {
    position:absolute; top:12px; left:50%; transform:translateX(-50%);
    background:rgba(205,32,44,.92); color:#fff; font-weight:700; font-size:10px;
    padding:1px 9px; border-radius:9px; letter-spacing:.8px;
  }
  #camview .live i { display:inline-block; width:6px; height:6px; border-radius:50%; background:#fff; margin-right:5px; animation:camblink 1.6s infinite; }
  @keyframes camblink { 0%,100% { opacity:1; } 50% { opacity:.25; } }
  #camview .x {
    position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%;
    background:rgba(10,13,20,.75); color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.25);
    font:12px system-ui; cursor:pointer; line-height:22px; text-align:center; padding:0;
  }
  #camview .name {
    margin:7px auto 0; text-align:center; color:rgba(255,255,255,.92); max-width:447px;
    background:rgba(10,13,20,.6); border:1px solid rgba(255,255,255,.1); border-radius:10px;
    padding:4px 10px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  }
  body.photo #camview { display:none !important; }
  #hud { /* top-left stack: Sims panel + timeline scrub below it, same width */
    position:fixed; top:12px; left:12px; z-index:10;
    display:flex; flex-direction:column; align-items:stretch; gap:8px;
    transform:scale(.75); transform-origin:top left; /* 25% smaller (mobile query overrides to .72) */
  }
  #chip { /* Sims-style status panel: glossy white segments (time/temp/weather/wind) + city-radio speaker */
    display:flex; align-items:center; flex-wrap:wrap; justify-content:space-evenly;
    font:12px/1.2 'Arial Rounded MT Bold','Trebuchet MS',system-ui,sans-serif;
    color:#1d4f9c; user-select:none; transition:opacity .4s; white-space:nowrap;
    background:linear-gradient(180deg,#fff 0%,#f3f8fe 45%,#e2edfb 100%);
    border:2px solid #fff; border-radius:18px; padding:6px 8px;
    box-shadow:0 5px 16px rgba(8,20,50,.4), inset 0 1px 0 #fff, inset 0 -3px 8px rgba(130,160,210,.28);
  }
  #chip .seg { display:flex; align-items:center; gap:7px; padding:2px 10px; }
  #chip .seg svg { width:27px; height:27px; flex:none; }
  #chip .v { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
  #chip .v b { font-size:17px; color:#17418a; letter-spacing:.2px; }
  #chip .v b small { font-size:10px; margin-left:2px; }
  #chip .v span { font-size:9.5px; color:#5f81b6; }
  #chip .sep { align-self:stretch; width:1px; margin:3px 0;
    background:linear-gradient(180deg,transparent,#b9cdea,transparent); }
  #chip .wxi { font-size:23px; }
  #chSnd { width:36px; height:36px; margin-left:6px; padding:4px; cursor:pointer; border-radius:50%;
    border:1px solid #d3e2f6; background:linear-gradient(180deg,#fff,#e7f0fc);
    box-shadow:0 1px 3px rgba(20,40,90,.25), inset 0 1px 0 #fff; transition:transform .15s; }
  #chSnd:hover { transform:scale(1.08); }
  #chSnd svg { display:block; width:100%; height:100%; }
  #chip .xtra { flex-basis:100%; display:none; text-align:right; padding:3px 6px 0;
    font-size:9.5px; color:#6c88b0; }
  #chip .off { opacity:.65; }
  @media (max-width: 820px) { #hud { transform:scale(.72); transform-origin:top left; } }
  #wxAlerts { /* NWS active-alert card — in the #hud stack below the slider, absent unless NYC has alerts */
    display:none; font:11px/1.4 'Arial Rounded MT Bold','Trebuchet MS',system-ui,sans-serif;
    color:#5c3a08; user-select:none;
    background:linear-gradient(180deg,rgba(255,251,240,.92),rgba(255,238,205,.92));
    border:2px solid #fff; border-left:6px solid #e8a020; border-radius:14px; padding:6px 11px;
    box-shadow:0 5px 16px rgba(8,20,50,.35), inset 0 1px 0 #fff;
  }
  #wxAlerts.sev { border-left-color:#d9482b; }
  #wxAlerts .wxr { display:flex; gap:7px; align-items:baseline; padding:1px 0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #wxAlerts .wxr b { color:#7a2d12; flex:none; }
  #ticker { /* live NYC headlines (amNY + THE CITY) — strip flush with the screen bottom (#ui floats above) */
    position:fixed; left:0; right:0; bottom:0; z-index:9; height:34px; display:none;
    overflow:hidden; user-select:none;
    font:12.5px/34px 'Arial Rounded MT Bold','Trebuchet MS',system-ui,sans-serif;
    background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(226,237,251,.72));
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-top:1px solid rgba(255,255,255,.75); border-bottom:1px solid rgba(180,200,230,.5);
  }
  #ticker .tkin { display:inline-flex; white-space:nowrap; will-change:transform;
    animation:tkscroll linear infinite; }
  #ticker:hover .tkin { animation-play-state:paused; }
  #ticker a { color:#17418a; text-decoration:none; padding:0 14px; }
  #ticker a:hover { text-decoration:underline; }
  #ticker .src { color:#7a93bb; font-size:10px; margin-right:7px; letter-spacing:.4px; }
  #ticker i.sep { color:#9fb6da; font-style:normal; }
  @keyframes tkscroll { from { transform:translateX(0); } to { transform:translateX(-50%); } }
  body.photo #ticker, body.focusmode #ticker, body.manual #ticker { display:none !important; }
  @media (max-width: 700px) { /* phones: entity nav becomes an icon-only vertical column on the right, above David */
    /* both tickers stay, pinned full-width at the very bottom (news below thoughts),
       above the home indicator; David + the icon column stack above them */
    #ticker { bottom:env(safe-area-inset-bottom, 0px); }
    #ui {
      left:auto; right:8px; transform:none; bottom:calc(198px + env(safe-area-inset-bottom, 0px));
      flex-direction:column; gap:7px; max-width:none;
      background:none; border:none; padding:0; backdrop-filter:none; -webkit-backdrop-filter:none;
    }
    #ui .sep, #ui #photo { display:none; } /* tour restart drops off mobile — the tour auto-runs on load */
    #ui .grp { flex-direction:column; gap:8px; }
    #presets .lbl { display:none; }              /* icons only */
    #presets button {
      width:48px; height:48px; padding:0; font-size:22px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      background:rgba(10,13,20,.62); border:1px solid rgba(255,255,255,.16);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
  }
  #thoughtTicker { /* resident-thought marquee — stacked right above the headlines */
    position:fixed; left:0; right:0; bottom:34px; z-index:9; height:30px; display:none;
    overflow:hidden; user-select:none;
    font:12px/30px 'Arial Rounded MT Bold','Trebuchet MS',system-ui,sans-serif;
    background:linear-gradient(180deg,rgba(240,246,255,.66),rgba(216,230,249,.66));
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border-top:1px solid rgba(255,255,255,.75); border-bottom:1px solid rgba(190,208,235,.45);
  }
  #thoughtTicker.solo { bottom:0; } /* headlines strip hidden → drop flush with the screen edge */
  #thoughtTicker .tkin { display:inline-flex; white-space:nowrap; will-change:transform; animation:tkscroll linear infinite; }
  #thoughtTicker:hover .tkin { animation-play-state:paused; }
  #thoughtTicker .th { color:#17418a; cursor:pointer; padding:0 14px; }
  #thoughtTicker .th:hover { text-decoration:underline; }
  #thoughtTicker .th .ic { margin-right:6px; text-decoration:none; display:inline-block; }
  #thoughtTicker .th .who { color:#7a93bb; font-size:10px; margin-left:7px; letter-spacing:.3px; }
  #thoughtTicker i.sep { color:#9fb6da; font-style:normal; }
  @media (min-width: 701px) { body.thticker #ui { bottom:74px; } } /* clears both strips; phones hide the tickers + dock the bar flush */
  body.photo #thoughtTicker, body.focusmode #thoughtTicker, body.manual #thoughtTicker { display:none !important; }
  @media (max-width: 700px) { #thoughtTicker { bottom:calc(34px + env(safe-area-inset-bottom, 0px)); } }
  .flbl {
    position:fixed; left:0; top:0; z-index:9; display:none; pointer-events:auto; cursor:pointer;
    font:10px/1.35 system-ui, -apple-system, sans-serif; color:rgba(255,255,255,.85);
    background:rgba(10,13,20,.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.09); border-radius:9px; padding:3px 8px;
    white-space:nowrap; will-change:transform;
  }
  .flbl:hover { background:rgba(30,40,60,.75); border-color:rgba(255,255,255,.25); }
  .swlbl {
    position:fixed; left:0; top:0; z-index:9; display:none; pointer-events:auto; cursor:pointer;
    font:10px/1.35 system-ui, -apple-system, sans-serif; color:rgba(255,255,255,.85);
    background:rgba(10,13,20,.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.09); border-radius:7px; padding:3px 8px;
    white-space:nowrap; will-change:transform;
  }
  .swlbl:hover { background:rgba(30,40,60,.75); border-color:rgba(255,255,255,.25); }
  .swlbl b { color:#fff; font-weight:600; }
  .swlbl .sub { color:rgba(255,255,255,.55); }
  body.photo .swlbl { display:none !important; }
  .fybl {
    position:fixed; left:0; top:0; z-index:9; display:none; pointer-events:auto; cursor:pointer;
    font:10px/1.35 system-ui, -apple-system, sans-serif; color:rgba(255,255,255,.85);
    background:rgba(10,20,32,.6); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(140,190,255,.18); border-radius:7px; padding:3px 8px;
    white-space:nowrap; will-change:transform;
  }
  .fybl:hover { background:rgba(25,45,70,.78); border-color:rgba(140,190,255,.4); }
  .fybl b { color:#fff; font-weight:600; }
  .fybl .sub { color:rgba(255,255,255,.55); }
  body.photo .fybl { display:none !important; }
  .fybl.bus { border-color:rgba(255,196,80,.4); } /* bus chips: MTA-bus amber accent */
  .fybl.bus b { color:#ffc450; }
  .fybl.bike { border-color:rgba(80,214,255,.4); }
  .fybl.bike b { color:#4fd6ff; }
  .fybl.birdf { border-color:rgba(150,200,255,.35); } /* flock chips: radar-sky accent */
  .fybl.birdf b { color:#a8d4ff; }
  /* focus mode: one dialogue at a time — everything but the weather chip and the
     concierge steps back until the user clicks anywhere / presses Esc */
  body.focusmode #ui, body.focusmode #hint, body.focusmode #flyhint, body.focusmode #scrub,
  body.focusmode #lockbtn, body.focusmode #camview,
  body.focusmode .fybl:not(#focusChip), body.focusmode .flbl { display:none !important; }
  #focusChip { display:none; border-color:rgba(255,255,255,.4); z-index:30; }
  #focusChip .off { color:rgba(255,255,255,.4); }
  .fybl.traffic { border-color:rgba(255,130,95,.4); } /* traffic chips: incident ember accent */
  .fybl.n311 { border-color:rgba(150,190,255,.4); } /* 311 chips: civic blue accent */
  .fybl.traffic b { color:#ff8a66; }
  .flbl b { color:#fff; font-weight:600; }
  .flbl .sub { color:rgba(255,255,255,.55); }
  body.photo .flbl { display:none !important; }
  #scrub { /* timeline scrub — Sims-styled to match #chip; #hud stretches it to the panel's width */
    display:flex; gap:8px; align-items:center;
    font:10px 'Arial Rounded MT Bold','Trebuchet MS',system-ui,sans-serif; color:#5f81b6;
    background:linear-gradient(180deg,#fff 0%,#f3f8fe 45%,#e2edfb 100%);
    border:2px solid #fff; border-radius:14px; padding:5px 10px;
    box-shadow:0 5px 16px rgba(8,20,50,.35), inset 0 1px 0 #fff, inset 0 -3px 8px rgba(130,160,210,.28);
    user-select:none; transition:opacity .4s;
  }
  #scrub input[type=range] { width:100%; accent-color:#3f7fd6; height:10px; }
  #tlWrap { position:relative; display:flex; align-items:center; flex:1; min-width:0; }
  #tlTicks { position:absolute; left:8px; right:8px; top:-2px; height:4px; pointer-events:none; }
  #tlTicks i { position:absolute; width:4px; height:4px; border-radius:50%; background:#3f9be0; opacity:.9; transform:translateX(-50%); }
  #tlBadge {
    display:flex; align-items:center; gap:4px; font-weight:600; white-space:nowrap;
    min-width:58px; justify-content:center; padding:2px 6px; border-radius:8px;
    background:rgba(63,127,214,.10); color:#8aa3c8;
  }
  #tlBadge i { width:6px; height:6px; border-radius:50%; background:#b9cdea; flex:0 0 auto; }
  #tlBadge.live { color:#fff; background:rgba(205,32,44,.92); } #tlBadge.live i { background:#fff; animation:camblink 1.6s infinite; }
  #tlBadge.sun { color:#c07f1f; } #tlBadge.sun i { background:#e8a558; }
  #tlBadge.past { color:#1f7fc0; } #tlBadge.past i { background:#3f9be0; }
  #scrub button {
    font:10px 'Arial Rounded MT Bold','Trebuchet MS',system-ui,sans-serif; color:#17418a; cursor:pointer;
    background:linear-gradient(180deg,#fff,#e7f0fc); border:1px solid #d3e2f6;
    border-radius:8px; padding:2px 8px; box-shadow:0 1px 3px rgba(20,40,90,.2), inset 0 1px 0 #fff;
  }
  body.photo #chip, body.manual #chip, body.photo #scrub, body.manual #scrub { opacity:0; pointer-events:none; }
  #agentFab { /* the concierge persona — portrait + "Talk to me!" pill (public/concierge-*.png) */
    position:fixed; right:12px; bottom:8px; z-index:31; width:128px; cursor:pointer;
    padding:0; border:none; background:none; transition:opacity .4s, transform .25s;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));
  }
  #agentFab img { display:block; width:100%; pointer-events:none; }
  #agentFab img.talk { position:absolute; left:14%; bottom:8%; width:72%; } /* pill overlaps his chest, per the source art */
  #agentFab:hover { transform:scale(1.05) translateY(-2px); }
  @media (max-width: 600px) { #agentFab { width:84px; right:6px; bottom:calc(64px + env(safe-area-inset-bottom, 0px)); } } /* just above the two ticker strips */
  #camDial { /* Sims-style movement dial above the concierge: up/down/left/right + zoom, click or hold */
    position:fixed; right:22px; bottom:216px; z-index:31; width:112px; height:112px;
    user-select:none; -webkit-user-select:none; touch-action:none;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.5)); transition:opacity .4s;
  }
  #rotDial { /* rotation dial stacked above: orbit left/right, tilt over/under + zoom center */
    position:fixed; right:22px; bottom:338px; z-index:31; width:112px; height:112px;
    user-select:none; -webkit-user-select:none; touch-action:none;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.5)); transition:opacity .4s;
  }
  #camDial svg, #rotDial svg { display:block; width:100%; height:100%; }
  #camDial .db, #rotDial .db { fill:url(#cdNavy); stroke:#101a36; stroke-width:1.4; cursor:pointer; }
  #camDial .db:hover, #rotDial .db:hover { fill:url(#cdNavyHi); }
  #camDial .db:active, #rotDial .db:active { fill:#5f77bd; }
  #camDial .ic, #rotDial .ic { pointer-events:none; }
  body.agent #camDial, body.photo #camDial, body.agent #rotDial, body.photo #rotDial { display:none !important; }
  @media (max-width: 600px) { /* phones: drop the dials entirely — joystick + drag-to-look cover navigation */
    #camDial, #rotDial { display:none !important; }
  }
  @media (min-width: 601px) and (hover: none) { /* touch tablets keep the dials, idling at low opacity */
    #camDial, #rotDial { opacity:.42; transition:opacity .35s; }
    body.dialing #camDial, body.dialing #rotDial { opacity:1; }
  }
  #vitals { /* City Vitals — live counts from every layer, matches the status panel */

}

        const jx = x + (R() - 0.5) * 34, jz = z + (R() - 0.5) * 30;
        if (!onLand(jx, jz)) continue;
        const cross = R() < 0.6;
        const h = 34 + R() * 26;
        const rot = (R() - 0.5) * 0.22;
        if (cross) { // cross-plan: two overlapping slabs
          const rc = pickPal('proj', R());
          const mk = (w, d) => pushB({ a: 0, x: jx, z: jz, w, d, h, rot, r: rc[0], g: rc[1], b: rc[2], s: R(), k: 0, f: F_HVAC });
          mk(46, 20); mk(20, 46);
        } else {
          makeBuilding(jx, jz, 44 + R() * 18, 19, rot, rec, R, { h, pal: 'proj', glass: false, arch: 3, superOK: true });
        }
      }
    }
  }
}

// ---- the 1811 grid
function genGrid() {
  for (let z = EV_Z0; z < GRID_Z1; z += 80) {
    const zc = z + 40;
    const c = coastAt(zc);
    // street segment across the island
    const isMajor = MAJOR_ST.has(z);
    if (z >= GRID_Z0 || zc > EV_Z0) {
      const x0 = z >= GRID_Z0 ? c.w + 6 : Math.max(c.w + 6, bwayXAt(z) + 10);
      SEG.push({ x0, z0: z, x1: c.e - 6, z1: z, w: isMajor ? 24 : STREET_W, kind: 'st' });
    }
    for (let ai = 0; ai < AVES.length - 1; ai++) {
      const a0 = AVES[ai], a1 = AVES[ai + 1];
      const bx0 = a0.x + a0.w / 2 + 4, bx1 = a1.x - a1.w / 2 - 4;
      const bw = bx1 - bx0; if (bw < 24) continue;
      const bcx = (bx0 + bx1) / 2;
      if (z < GRID_Z0 && bcx < bwayXAt(zc) + 30) continue; // EV grid only east of Broadway
      if (!onLand(bcx, zc)) continue;
      if (inCentralPark(bcx, zc) || inPark(bcx, zc)) continue;
      const R = rng(iHash(Math.round(bcx), z));
      fillBlock(bcx, zc, bw, 80 - STREET_W - 2, 0, R);
    }
  }
  // avenue segments (drawn piecewise where valid)
  for (const a of AVES) {
    let run = null;
    for (let z = EV_Z0; z <= GRID_Z1; z += 80) {
      const valid = onLand(a.x, z) && !inCentralPark(a.x + (a.x === 0 ? 6 : a.x === -720 ? -6 : 0), z)
        && !(a.x > PARK.x0 && a.x < PARK.x1 && z > PARK.z0 && z < PARK.z1)
        && !(z < GRID_Z0 && a.x < bwayXAt(z) - 20);
      if (valid) { if (!run) run = z; }
      else if (run !== null) { SEG.push({ x0: a.x, z0: run, x1: a.x, z1: z - 80, w: a.w, kind: 'ave' }); run = null; }
    }
    if (run !== null) SEG.push({ x0: a.x, z0: run, x1: a.x, z1: GRID_Z1, w: a.w, kind: 'ave' });
  }
  // central park transverses
  for (const tz of TRANSVERSES) SEG.push({ x0: PARK.x0, z0: tz, x1: PARK.x1, z1: tz, w: 14, kind: 'st' });
}

// ---- rotated lattice zones (downtown tangle + village)
function genZone(z0, z1, ang, sw, aw, xMin, xMax, seedK, jitter, eastOfBway) {
  const R0 = rng(iHash(seedK, 77));
  const ca = Math.cos(ang), sa = Math.sin(ang);
  const zc0 = (z0 + z1) / 2;
  const span = Math.max(xMax - xMin, z1 - z0) + 800;
  const ni = Math.ceil(span / aw), nj = Math.ceil(span / sw);
  for (let i = -ni; i <= ni; i++) {
    for (let j = -nj; j <= nj; j++) {
      const lx = i * aw, lz = j * sw;
      const x = lx * ca - lz * sa, z = zc0 + lx * sa + lz * ca;
      if (z < z0 + 30 || z > z1 - 30) continue;
      if (x < xMin || x > xMax) continue;
      if (eastOfBway === false && x > bwayXAt(z) - 20) continue;
      if (eastOfBway === true && x < bwayXAt(z) + 20) continue;
      if (!onLand(x, z)) continue;
      const R = rng(iHash(Math.round(x), Math.round(z)));
      const rot = ang + (R() - 0.5) * jitter;
      fillBlock(x, z, aw - 16 - R() * 8, sw - 15 - R() * 6, rot, R);
      // lattice street segments (for the canvas)
      if (j % 1 === 0) {
        const hx = (aw / 2) * ca, hz = (aw / 2) * sa;
        SEG.push({ x0: x - hx, z0: z - hz - sw / 2 * ca, x1: x + hx, z1: z + hz - sw / 2 * ca, w: 11, kind: 'lane' });
      }
      if (i % 1 === 0) {
        const hx = -(sw / 2) * sa, hz = (sw / 2) * ca;
        SEG.push({ x0: x - hx - aw / 2 * ca, z0: z - hz - aw / 2 * sa, x1: x + hx - aw / 2 * ca, z1: z + hz - aw / 2 * sa, w: 11, kind: 'lane' });
      }
    }
  }
}

function generateCity() {
  /* STREET-TRUTH Manhattan: real CSCL edges → SEG (canvas + traffic),
     real block faces → perimeter-lot fills. genGrid/genZone (the old
     stylized 1811-grid + lattice generators above) are retired; the
     district/height/palette model in makeBuilding is untouched — it is
     position-based and now receives true positions. */
  let segN = 0, blkN = 0;
  for (const e of G_EDGES) {
    if (e.bo !== 1 || e.rw === 4) continue;               // Manhattan only; tunnels undrawn
    const kind = e.rw >= 1 && e.rw <= 3 && e.w >= 20 ? 'ave' : e.w >= 15 ? 'st' : 'lane';
    for (let i = 0; i < e.p.length - 1; i++) {
      const a = e.p[i], b = e.p[i + 1];
      if (!onLand((a[0] + b[0]) / 2, (a[1] + b[1]) / 2)) continue; // bridges/ramps leaving the island
      SEG.push({ x0: a[0], z0: a[1], x1: b[0], z1: b[1], w: e.w, kind });
      segN++;
    }
  }
  /* REAL BUILDINGS (user's one-time bake): every Manhattan box is a true
     footprint+height from the NYC Building Footprints dataset, fed through
     makeBuilding so the district palette/arch/window character still applies.
     genSuperblocks retired — the real projects are in the data. */
  let realN = 0;
  for (let i = 0; i < BLDG.n; i++) {
    const x = BLDG.x[i], z = BLDG.z[i];
    if (!onLand(x, z)) continue;
    if (inFidi(x, z)) continue; // FiDi core renders real DCP massing (fidi.json) instead
    const R = rng(iHash(BLDG.bin[i] | 0, 3));
    makeBuilding(x, z, BLDG.w[i], BLDG.d[i], BLDG.r[i] / 1000, recipeAt(x, z), R,
      { h: Math.max(4, BLDG.h[i]), real: true });
    realN++;
  }
  const blkN2 = realN; // (block-perimeter fill retired in favor of real footprints)
  console.log('[manhattan] real fabric:', segN, 'street segments,', realN, 'REAL footprints,', B.length, 'buildings');
}

const FOG_UNI = { uFogColor: { value: new THREE.Color(0xe3c096) }, uFogDensity: { value: 4.0e-5 } };
const cityUniforms = {
  uTime: { value: 0 }, uDusk: { value: 0 }, uGolden: { value: 1 }, uNight: { value: 0.1 },
  uSunDir: { value: MODES.golden.dir.clone() }, uSunColor: { value: new THREE.Color(0xffb066) },

};

  uWaterW: { value: 1 },                         // water scroll scale
  uSteamW: { value: new THREE.Vector2(0, 0) }    // steam lean (world m per age-unit)
};
const SHADER_NOISE = `
  float h21(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
  float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
    return mix(mix(h21(i),h21(i+vec2(1,0)),f.x), mix(h21(i+vec2(0,1)),h21(i+1.),f.x), f.y); }`;

function patchCityMaterial(mat, tier) {
  mat.customProgramCacheKey = () => 'city' + tier;
  mat.onBeforeCompile = (sh) => {
    Object.assign(sh.uniforms, cityUniforms);
    sh.vertexShader = sh.vertexShader
      .replace('#include <common>', `#include <common>
        varying vec3 vW; varying vec3 vN; varying float vSeed; varying float vKind;
        attribute float aSeed; attribute float aKind;`)
      .replace('#include <worldpos_vertex>', `#include <worldpos_vertex>
        vec4 _wp = vec4(transformed, 1.0);
        #ifdef USE_INSTANCING
          _wp = instanceMatrix * _wp;
        #endif
        _wp = modelMatrix * _wp;
        vW = _wp.xyz;
        vN = inverseTransformDirection(transformedNormal, viewMatrix);
        vSeed = aSeed; vKind = aKind;`);
    sh.fragmentShader = ('#define CITY_TIER ' + tier + '\n') + sh.fragmentShader
      .replace('#include <common>', `#include <common>
        varying vec3 vW; varying vec3 vN; varying float vSeed; varying float vKind;
        uniform float uTime, uDusk, uGolden, uNight, uWinDetail, uGlint, uCloud, uFadeNear, uFadeFar, uSnow, uLate;
        uniform vec3 uSunDir; uniform vec3 uSunColor; uniform vec3 uSkyTint;
        ${SHADER_NOISE}`)
      .replace('#include <map_fragment>', `#include <map_fragment>
        float dcam = distance(vW, cameraPosition);
        float dh = h21(gl_FragCoord.xy);
        #if CITY_TIER == 1
          if (dh < smoothstep(uFadeNear, uFadeFar, dcam)) discard;
        #elif CITY_TIER == 2
          if (dh >= smoothstep(uFadeNear, uFadeFar, dcam)) discard;
        #elif CITY_TIER == 3
          if (dh > 1.0 - smoothstep(520.0, 760.0, dcam)) discard;
        #endif
        vec3 nrm = normalize(vN);
        float roofy = smoothstep(0.55, 0.8, abs(nrm.y));
        vec2 wuv = (abs(nrm.x) > abs(nrm.z)) ? vec2(vW.z, vW.y) : vec2(vW.x, vW.y);
        wuv /= vec2(2.9, 3.3); wuv.x += fract(vSeed * 0.731) * 17.0;
        vec2 wcell = floor(wuv); vec2 wfc = fract(wuv);
        float wr = h21(wcell + floor(vSeed * 97.0));
        float glassy = step(0.5, vKind);
        float inWin = step(wfc.x, mix(0.60, 0.92, glassy)) * step(wfc.y, mix(0.52, 0.84, glassy));
        float fw = max(fwidth(wuv.x), fwidth(wuv.y));
        float farness = smoothstep(0.30, 0.85, fw); // windows below pixel scale
        float facade = (1.0 - roofy) * step(-0.5, vKind);
        inWin *= uWinDetail * (1.0 - farness) * facade;
        if (vKind < -0.5) inWin = 0.0;
        diffuseColor.rgb *= mix(1.0, mix(0.30 + 0.4 * wr, 0.55 + 0.5 * wr, glassy), inWin);
        diffuseColor.rgb = mix(diffuseColor.rgb, uSkyTint, glassy * inWin * 0.35);
        vec2 cp = vW.xz * 0.00019 + vec2(uTime * 0.006, uTime * 0.0023);
        float cl = vnoise(cp) * 0.62 + vnoise(cp * 3.13 + 7.7) * 0.38;
        diffuseColor.rgb *= (1.0 - uCloud) + uCloud * smoothstep(0.18, 0.85, cl);
        // snow cover: every roof in the city whitens from one uniform
        diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.93, 0.94, 0.97), roofy * uSnow * 0.85);`)
      .replace('#include <opaque_fragment>', `
        float duskP = clamp(uDusk * 1.45 - fract(vSeed * 3.71) * 0.42, 0.0, 1.0);
        float coolBand = step(0.82, fract(wr * 7.31));
        // late-night decay: homes go dark faster than office floors
        float lateK = mix(uLate, 1.0 - (1.0 - uLate) * 0.5, coolBand);
        float litW = step(wr, duskP * 0.45 * lateK) * inWin;
        vec3 warmC = mix(vec3(1.0, 0.72, 0.42), vec3(0.72, 0.84, 1.0), coolBand);
        float nearDim = 0.4 + 0.6 * smoothstep(60.0, 500.0, dcam); // don't clip to white slabs point-blank
        vec3 emisW = warmC * litW * 3.2 * nearDim;
        // aggregate glow where discrete windows fall below pixel scale — the whole island still ignites
        float bldVar = fract(vSeed * 5.31);
        float bandVar = vnoise(wuv * 0.22);
        vec3 glowC = mix(vec3(1.0, 0.60, 0.26), vec3(0.62, 0.78, 1.0), glassy * 0.55);
        float bv2 = bandVar * bandVar;
        emisW += glowC * duskP * farness * facade * pow(bldVar, 1.6) * (0.15 + 0.85 * bv2) * (0.3 + 0.7 * wr) * 1.7 * (0.4 + 0.6 * uLate);
        float shadeSide = 1.0 - clamp(dot(nrm, uSunDir), 0.0, 1.0);
        emisW += warmC * inWin * step(wr, 0.10) * shadeSide * uGolden * 0.5;
        vec3 Rv = reflect(normalize(vW - cameraPosition), nrm);
        float gl2 = pow(max(dot(Rv, uSunDir), 0.0), 260.0);
        emisW += uSunColor * gl2 * (step(0.80, fract(wr * 29.7)) * inWin) * (2.2 + glassy * 2.2) * uGlint;
        outgoingLight += emisW;
        #include <opaque_fragment>`);
  };
  return mat;
}

      .replace('#include <common>', `#include <common>
        varying vec3 vWg; varying vec3 vNg; uniform float uTime, uCloud, uSnow; ${SHADER_NOISE}`)
      .replace('#include <map_fragment>', `#include <map_fragment>
        vec2 cp = vWg.xz * 0.00019 + vec2(uTime * 0.006, uTime * 0.0023);
        float cl = vnoise(cp) * 0.62 + vnoise(cp * 3.13 + 7.7) * 0.38;
        diffuseColor.rgb *= (1.0 - uCloud) + uCloud * smoothstep(0.18, 0.85, cl);
        ${snowy ? 'diffuseColor.rgb = mix(diffuseColor.rgb, vec3(0.92, 0.93, 0.96), smoothstep(0.35, 0.75, normalize(vNg).y) * uSnow * 0.88);' : ''}`);

}

      void main(){

   (1) compress: normals → Int8 normalized (<0.5° error on Lambert), colors → Uint8

function pushBeam(S, x0, y0, z0, x1, y1, z1, r, col, kind = -1) {
  const ax = x1 - x0, ay = y1 - y0, az = z1 - z0;
  const len = Math.hypot(ax, ay, az); if (len < 0.01) return;
  const ux = ax / len, uy = ay / len, uz = az / len;
  let px, py, pz;
  if (Math.abs(uy) > 0.92) { px = 1; py = 0; pz = 0; }
  else { const l = Math.hypot(uz, ux) || 1; px = uz / l; py = 0; pz = -ux / l; }
  const qx = uy * pz - uz * py, qy = uz * px - ux * pz, qz = ux * py - uy * px;
  const cs = [
    [px * r + qx * r, py * r + qy * r, pz * r + qz * r],
    [-px * r + qx * r, -py * r + qy * r, -pz * r + qz * r],
    [-px * r - qx * r, -py * r - qy * r, -pz * r - qz * r],
    [px * r - qx * r, py * r - qy * r, pz * r - qz * r]
  ];
  for (let i = 0; i < 4; i++) {
    const A = cs[i], Bc = cs[(i + 1) % 4];
    const nx = (A[0] + Bc[0]) / 2, ny = (A[1] + Bc[1]) / 2, nz = (A[2] + Bc[2]) / 2;
    const nl = Math.hypot(nx, ny, nz) || 1;
    sinkQuad(S, x0 + A[0], y0 + A[1], z0 + A[2], x1 + A[0], y1 + A[1], z1 + A[2],
      x1 + Bc[0], y1 + Bc[1], z1 + Bc[2], x0 + Bc[0], y0 + Bc[1], z0 + Bc[2], nx / nl, ny / nl, nz / nl, col, 0, kind);
  }
}

function buildBridge(cfg) {
  const { ax, az, bx, bz, t1, t2, towerH, deckY, deckW, col, style } = cfg;
  const dx = bx - ax, dz = bz - az, L = Math.hypot(dx, dz);
  const ux = dx / L, uz = dz / L;
  const px = -uz, pz = ux;                       // across-deck unit
  const extA = cfg.extA ?? 180, extB = cfg.extB ?? 220;
  const detail = !!cfg.detail;                   // Brooklyn / Manhattan / Queensboro get the full treatment
  const spt = (s, off) => [ax + ux * s + px * off, az + uz * s + pz * off]; // span coord → world
  // deck polyline with approach ramps
  const pts = [];
  const N = detail ? 44 : 30;
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const s = -extA + t * (L + extA + extB);
    const x = ax + ux * s, z = az + uz * s;
    let y = deckY;
    if (s < 0) y = lerp(8, deckY, sstep(-extA, 0, s));
    else if (s > L) y = lerp(deckY, 8, sstep(L, L + extB, s));
    pts.push(new THREE.Vector3(x, y, z));
  }
  const rot = Math.atan2(dz, dx); // pushBoxG rot rotates +x toward +z
  for (let i = 0; i < N; i++) {
    const a = pts[i], b = pts[i + 1];
    const mlen = Math.hypot(b.x - a.x, b.z - a.z) + 1.5;
    pushBoxG(LS, (a.x + b.x) / 2, (a.z + b.z) / 2, (a.y + b.y) / 2 - 1.6, 2.4, mlen, deckW, rot, col, 0.3, -1);
    if (detail) { // stiffening trusses + railings along both deck edges
      for (const side of [-1, 1]) {
        const eo = side * (deckW / 2 - 0.45);
        const aex = a.x + px * eo, aez = a.z + pz * eo, bex = b.x + px * eo, bez = b.z + pz * eo;
        pushBeam(LS, aex, a.y + 1.4, aez, bex, b.y + 1.4, bez, 0.22, col);                    // railing
        pushBeam(LS, aex, a.y - 4.0, aez, bex, b.y - 4.0, bez, 0.35, col);                    // bottom chord
        if (i % 2 === 0) pushBeam(LS, aex, a.y - 4.0, aez, bex, b.y + 1.0, bez, 0.26, col);   // zig
        else pushBeam(LS, aex, a.y + 1.0, aez, bex, b.y - 4.0, bez, 0.26, col);               // zag
      }
    }
  }
  const towers = [];
  if (style === 'truss' && detail) {
    /* ---- Queensboro: a double-cantilever steel TRUSS — no cables. Spiky tower
       bents flank the two channel spans (Roosevelt Island passes underneath);
       the top chord peaks at each bent and dips over the channels. ---- */
    const bents = [0.13, 0.42, 0.585, 0.87];
    const peak = towerH - deckY;
    const prof = s => { // truss height above deck along the span
      let h = 6.5;
      for (const b of bents) h = Math.max(h, (peak + 12) * Math.max(0, 1 - Math.abs(s / L - b) * 4.6));
      return Math.min(h, peak + 12);
    };
    const TN = 42;
    for (const side of [-1, 1]) {
      const off = side * (deckW / 2 + 0.6);
      let prev = null;
      for (let i = 0; i <= TN; i++) {
        const s = (i / TN) * L;
        const topY = deckY + prof(s);
        const [cx2, cz2] = spt(s, off);
        if (prev) pushBeam(LS, prev[0], prev[1], prev[2], cx2, topY, cz2, 0.9, col);          // top chord
        if (prof(s) > 8) {
          pushBeam(LS, cx2, deckY - 3.5, cz2, cx2, topY, cz2, 0.34, col);                     // vertical
          if (prev) pushBeam(LS, prev[0], deckY - 3.5, prev[2], cx2, topY, cz2, 0.28, col);   // diagonal
        }
        if (i % 2 === 0 && side === -1) NECKLACE.push(cx2, topY + 0.8, cz2);
        prev = [cx2, topY, cz2];
      }
    }
    for (const b of bents) { // tower bents with the QB signature finial spikes
      const sB = b * L;
      const bh = deckY + prof(sB) + 5;
      for (const side of [-1, 1]) {
        const [lx, lz] = spt(sB, side * (deckW / 2 + 0.6));
        pushBoxG(LS, lx, lz, 0, bh, 4.6, 4.6, rot, col, 0.3, -1);
        pushPrism(LS, lx, lz, bh, 10, 2.6, 0.22, 4, rot, col, 0.3, -1);
      }
      const [mxB, mzB] = spt(sB, 0);
      pushBoxG(LS, mxB, mzB, deckY + prof(sB) - 3, 3, 3, deckW + 8, rot + Math.PI / 2, col, 0.3, -1);
      towers.push([mxB, mzB]);
    }
  } else {
    // ---- towers (suspension styles) ----
    for (const tf of [t1, t2]) {
      const s0 = L * tf;
      const [tx, tz] = spt(s0, 0);
      towers.push([tx, tz]);
      if (detail && style === 'gothic') {
        /* Brooklyn: masonry piers — broad base, three columns, stepped pointed
           arches over each roadway, cornice, pyramidal caps */
        pushBoxG(LS, tx, tz, 0, deckY + 2, 14, deckW + 13, rot, col, 0.3, -1);
        for (const off of [-(deckW / 2 + 3.6), 0, deckW / 2 + 3.6]) {

    birds: '/api/birds', weather: '/api/weather',

/* ============================================================
   25v. CHIP LIMITER — phones only. The scene's floating transit/
   incident dialogues (.fybl: subway, bus, ferry, 311, closures,
   bikes, flocks) pile up fast on a small screen. Each frame, keep
   only the 5 nearest screen-center visible and hide the rest via
   `visibility` — an overlay that never touches each module's own
   `display` logic, so nothing fights and it self-corrects as the
   camera moves. Air-traffic labels (.flbl) and persona bubbles
   (.thoughtB) are different classes, so they're never capped.
   Positions are read from the inline transform (no forced layout).
   ============================================================ */
const chipLimiter = (() => {
  const MOBILE = matchMedia('(max-width: 700px)').matches;
  const MAX = 5;
  const re = /translate\(\s*([-\d.]+)px,\s*([-\d.]+)px/;
  function tick() {
    if (!MOBILE) return;
    const all = document.getElementsByClassName('fybl');
    const cx = innerWidth / 2, cy = innerHeight / 2;
    const shown = [];
    for (let i = 0; i < all.length; i++) {
      const c = all[i];
      if (c.id === 'focusChip' || c.style.display !== 'block') continue; // module hid it, or it's the pinned focus
      const m = re.exec(c.style.transform);
      const x = m ? +m[1] : cx, y = m ? +m[2] : cy;
      const dx = x - cx, dy = y - cy;
      shown.push({ c, d: dx * dx + dy * dy });
    }
    if (shown.length <= MAX) { for (const s of shown) s.c.style.visibility = ''; return; }
    shown.sort((a, b) => a.d - b.d);
    for (let i = 0; i < shown.length; i++) shown[i].c.style.visibility = i < MAX ? '' : 'hidden';
  }
  return { tick };
})();

/* ============================================================
   25u. PERSONA AVATAR — the resident's own voxel figure, rendered

    add(F.GEO.eyes, MATS.eyes, F.EYE);
    add(F.GEO.shirt, MATS.shirt, F.SHIRTS[ci % F.SHIRTS.length]);
    add(F.GEO.legs, MATS.legs, F.PANTS[(ci * 5 + 2) % F.PANTS.length]);
    add(F.GEO.shoes, MATS.shoes, F.SHOES[ci % F.SHOES.length]);

    if (t.includes('water') || t.includes('sewer') || t.includes('flood') || t.includes('plumbing')) return [0.30, 0.90, 1.0];

    ['vSpeed', '🚦 Avg road speed'],
    ['vBirds', '🐦 Birds aloft (radar est.)']
  ].map(([id, lab, ring]) => '<div class="vrow" id="r_' + id + '"><span>' + lab + '</span>' +
    (ring ? '<span class="vval"><svg class="vring" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8"/>' +
      '<circle class="fg" cx="10" cy="10" r="8" id="' + id + '_ring"/></svg><b id="' + id + '">—</b></span>'
      : '<b id="' + id + '">—</b>') + '</div>').join('');
  const put = (id, txt, show = true) => {
    document.getElementById(id).textContent = txt;
    document.getElementById('r_' + id).style.display = show ? '' : 'none';
  };
  const RING_C = 2 * Math.PI * 8; // r=8 in the 20×20 viewBox
  const setRing = (id, num, den) => {
    const f = den > 0 ? Math.min(1, Math.max(0, num / den)) : 0;
    document.getElementById(id + '_ring').style.strokeDasharray = (f * RING_C).toFixed(2) + ' ' + RING_C.toFixed(2);
  };
  function updateVitals() {
    let rep = 0; for (const p of personas.list) rep += p.rep || 0;
    put('vResidents', personas.list.length
      ? fmt(personas.list.length) + ' personas / ' + (rep / 1e6).toFixed(1) + 'M NYC residents' : '—');
    const ev = rtraffic.events; let cl = 0; for (const e of ev) if (e.kind !== 'incident') cl++;
    const inc = ev.length - cl;
    put('vEvents', fmt(cl) + (inc ? ' (+' + fmt(inc) + ' incident' + (inc > 1 ? 's' : '') + ')' : ''));
    let dwell = 0; for (const tr of subway.trips.values()) if (tr.dwellFeed) dwell++;
    put('vSubway', fmt(subway.trips.size - dwell) + ' / ' + fmt(subway.trips.size) + ' trains');
    setRing('vSubway', subway.trips.size - dwell, subway.trips.size);
    let bm = 0; for (const b of buses.list) if (b.spd > 0.4) bm++;
    put('vBuses', fmt(bm) + ' / ' + fmt(buses.list.length) + ' buses');
    setRing('vBuses', bm, buses.list.length);
    let fu = 0; for (const f of ferries.list) if (!f.docked) fu++;
    put('vFerries', fmt(fu) + ' / ' + fmt(ferries.list.length) + ' ferries');
    setRing('vFerries', fu, ferries.list.length);
    let heli = 0; for (const p of flights.list) if (p.kind === 'heli') heli++;
    put('vAir', fmt(flights.list.length) + ' aircraft' + (heli ? ' (' + heli + ' 🚁)' : ''));
    // available = every docked bike (classic + ebike); total = dock capacity, since the
    // GBFS feed never says how many bikes are out riding (no true live fleet count exists)
    let bikes = 0, cap = 0;
    for (const s of citibike.stations) { if (!s.on) continue; bikes += (s.bikes || 0) + (s.ebikes || 0); cap += s.cap || 0; }
    put('vBikes', fmt(bikes) + ' / ' + fmt(cap) + ' bikes');
    setRing('vBikes', bikes, cap);
    put('vCams', fmt(cams.list.length) + ' cams');
    let spdS = 0, spdN = 0; for (const L of rtraffic.links) if (L.speed != null) { spdS += L.speed; spdN++; }
    put('vSpeed', Math.round(spdS / spdN) + ' mph', spdN > 0);
    put('vBirds', '≈' + fmt(BIRDS.aloft) + ' birds', BIRDS.aloft > 0);
    positionCredit();
  }
  // keep the credit badge hugging the bottom of City Vitals on desktop — the panel's
  // height changes as conditional rows (avg speed, birds aloft) appear/disappear, so a
  // fixed CSS top would get covered. Mobile keeps its CSS top-right position.
  const credit = document.getElementById('credit');
  function positionCredit() {
    if (matchMedia('(max-width: 700px)').matches) { credit.style.top = ''; return; }
    credit.style.top = Math.round(el.getBoundingClientRect().bottom + 10) + 'px';
  }
  updateVitals();
  setInterval(updateVitals, 2000);
}
// ---- NWS alert card (#wxAlerts): below the time slider, present only while NYC has
// active watches/warnings (api.weather.gov, five-borough filter server-side).
{
  const el = document.getElementById('wxAlerts');
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let wxAlerts = [];
  function renderWx() {
    if (!wxAlerts.length || HIST.active) { el.style.display = 'none'; return; } // "now" info: hidden during replay
    el.classList.toggle('sev', wxAlerts.some(a => /severe|extreme/i.test(a.severity || '')));
    el.innerHTML = wxAlerts.slice(0, 4).map(a =>
      '<div class="wxr"><b>⚠️ ' + esc(a.event) + '</b><span>' + esc(a.headline || '') + '</span></div>').join('');
    el.style.display = 'block';
  }
  function pollWx() {
    liveBridge.get('nwsalerts')
      .then(j => { wxAlerts = Array.isArray(j.alerts) ? j.alerts : []; renderWx(); })
      .catch(() => { /* keep last-good card */ });
  }
  pollWx();
  setInterval(pollWx, 300000);
  setInterval(renderWx, 5000); // follow HIST in/out without waiting for the next poll
  window.__wxalerts = (fake) => { wxAlerts = fake || []; renderWx(); }; // dev/testing hook
}
// ---- headline ticker (#ticker): amNY + THE CITY, slow marquee, click → article in a new tab
{
  const tk = document.getElementById('ticker'), tin = tk.querySelector('.tkin');
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  let sig = '';
  function build(items) {
    const seq = items.map(it =>
      '<a href="' + esc(it.url) + '" target="_blank" rel="noopener noreferrer">' +
      '<span class="src">' + esc(it.src) + '</span>' + esc(it.t) + '</a><i class="sep">✦</i>').join('');
    tin.innerHTML = seq + seq; // doubled content: the −50% keyframe wraps seamlessly
    tin.style.animationDuration = Math.max(60, items.length * 9) + 's'; // ~9 s per headline: readable
    tk.style.display = 'block';
  }
  function pollNews() {
    liveBridge.get('headlines')
      .then(j => {
        const items = Array.isArray(j.items) ? j.items : [];
        if (!items.length) return; // never blank an already-running ticker
        const s = items.map(i => i.url).join('|');
        if (s !== sig) { sig = s; build(items); } // unchanged list → don't restart the scroll
      })
      .catch(() => { /* keep scrolling last-good headlines */ });
  }
  pollNews();
  setInterval(pollNews, 600000);
}
// first visit: start the Manhattan auto-tour — but never hijack a deep link that
// pins the camera or the timeline (hash-driven screenshots/tests stay deterministic)
if (!/cam=|tgt=|scrub=|snap/.test(location.hash)) autoPan.start();
// ---- resident-thought ticker (#thoughtTicker): a marquee of what the crowd is
// thinking, stacked right above the headlines. Thoughts come from the SAME §25t
// generator the bubbles use (census identity + live-reactive; the Phase 2 baked
// LLM sheet slots in automatically when it ships). Click a thought → meet that
// resident: personas.open() glides the camera in, follows them, and opens the
// card + voxel portrait. Live-mode only (HIST hides it, like the bubbles).
{
  const tk = document.getElementById('thoughtTicker'), tin = tk.querySelector('.tkin');
  const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  let items = []; // [{ i: personas.list index, ic, t, who }]
  let salt = 9001; // separate salt-space from the bubbles so the ticker isn't a rerun
  function sample() {
    const list = personas.list;
    if (!list.length) return [];
    const out = [], used = new Set();
    salt++;
    while (out.length < 24 && used.size < Math.min(list.length, 400)) {
      const i = (Math.random() * list.length) | 0;
      if (used.has(i)) continue;
      used.add(i);
      const pp = list[i];
      const th = thoughts._make(i, pp, salt);
      out.push({ i, ic: th.ic, t: th.t, who: personas.who(pp) });
    }
    return out;
  }
  function build() {
    const next = sample();
    if (!next.length) return; // personas not loaded yet — keep whatever is scrolling
    items = next;
    const seq = items.map((it, k) =>
      '<span class="th" data-k="' + k + '"><span class="ic">' + it.ic + '</span>“' + esc(it.t) + '”' +
      '<span class="who">' + esc(it.who) + '</span></span><i class="sep">✦</i>').join('');
    tin.innerHTML = seq + seq; // doubled content: the −50% keyframe wraps seamlessly
    tin.style.animationDuration = Math.max(60, items.length * 7) + 's';
  }
  tin.addEventListener('click', (e) => {
    const el = e.target.closest('.th');
    if (!el) return;
    const it = items[+el.dataset.k % Math.max(items.length, 1)];
    if (it && personas.list[it.i]) personas.open(personas.list[it.i]);
  });
  function vis() { // live-mode only + stack state (drop flush if headlines are hidden)
    const on = items.length && !HIST.active;
    tk.style.display = on ? 'block' : 'none';
    tk.classList.toggle('solo', document.getElementById('ticker').style.display !== 'block');
    document.body.classList.toggle('thticker', !!on);
  }
  const boot = setInterval(() => { if (!items.length) { build(); vis(); } else clearInterval(boot); }, 2500);
  setInterval(build, 180000); // fresh crowd sample every 3 min
  setInterval(vis, 2000);
}
frame();
</script>
